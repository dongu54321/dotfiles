  #Homepage
  homepage:
    image: ghcr.io/benphelps/homepage:latest
    container_name: homepage
    restart: always
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
    ports:
      - "127.0.0.1:50300:3000"
    volumes:
      - ./appdata/homepage:/app/config
      # - /var/run/docker.sock:/var/run/docker.sock
#Jellyfin Media Server
  jellyfin:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    image: lscr.io/linuxserver/jellyfin #https://docs.linuxserver.io/images/docker-jellyfin
    container_name: jellyfin
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
      # - JELLYFIN_PublishedServerUrl=192.168.0.5 #optional
    volumes:
      - ~/media/library:/config
      - ~/media/media:/media/media
      - ~/media/torrents/iphone:/media/torrents/iphone
      # - ~/media/movies:/data/movies
      # - ~/media/Animes:/data/Animes
      # - ~/media/IphoneProMax:/data/IphoneProMax
    ports:
      - "127.0.0.1:58096:8096"
      # - 8920:8920 #optional 
      # - 7359:7359/udp #optional
      # - 1900:1900/udp #optional
  #Jacket-
  jackett:
    image: lscr.io/linuxserver/jackett
    container_name: jackett
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
      # - AUTO_UPDATE=true #optional
      # - RUN_OPTS=<run options here> #optional
    volumes:
      - ./appdata/jacket:/config
      - ~/media/blackhole:/media/blackhole
    ports:
      - 127.0.0.1:9117:9117
    restart: unless-stopped
#Duluge Torrents
  deluge:
    image: lscr.io/linuxserver/deluge
    container_name: deluge
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
      - DELUGE_LOGLEVEL=error #optional
    volumes:
      - ./appdata/deluge/config:/config
      - ~/media/torrents:/media/torrents
      - ~/media/torrents/iphone:/media/torrents/iphone
    ports:
      - 127.0.0.1:8112:8112
      - 127.0.0.1:6881:6881
      - 127.0.0.1:6881:6881/udp
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
    volumes:
      - ./appdata/radarr/config:/config
      - ~/media:/media
    ports:
      - 127.0.0.1:7878:7878
    restart: unless-stopped
    
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
    volumes:
      - ./appdata/bazarr/config:/config
      - ~/media/media:/media/media
    ports:
      - 127.0.0.1:6767:6767
    restart: unless-stopped

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:latest
    restart: unless-stopped
    environment:
      - PUID=1007
      - PGID=1007
      - TZ=Asia/Bangkok
    volumes:
      - ./appdata/sonarr/config:/config
      - ~/media:/media
    ports:
      - 127.0.0.1:8989:8989

# volumes:
  # postgresdata:
  # changedetection-data:
  whoogle-search:
    image: benbusby/whoogle-search:latest
    container_name: whoogle-search
    restart: always
    pids_limit: 50
    mem_limit: 256mb
    memswap_limit: 256mb
    # user debian-tor from tor package
    #user: whoogle
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    tmpfs:
      - /config/:size=10M,uid=927,gid=927,mode=1700
      - /var/lib/tor/:size=15M,uid=927,gid=927,mode=1700
      - /run/tor/:size=1M,uid=927,gid=927,mode=1700
    environment: # Uncomment to configure environment variables
      # Basic auth configuration, uncomment to enable
      #- WHOOGLE_USER=<auth username>
      #- WHOOGLE_PASS=<auth password>
      # Proxy configuration, uncomment to enable
      #- WHOOGLE_PROXY_USER=<proxy username>
      #- WHOOGLE_PROXY_PASS=<proxy password>
      #- WHOOGLE_PROXY_TYPE=<proxy type (http|https|socks4|socks5)
      #- WHOOGLE_PROXY_LOC=<proxy host/ip>
      # Site alternative configurations, uncomment to enable
      # Note: If not set, the feature will still be available
      # with default values.
      #- WHOOGLE_ALT_TW=farside.link/nitter
      - WHOOGLE_ALT_YT=youtube.momo.nohost.me
      #- WHOOGLE_ALT_IG=farside.link/bibliogram/u
      - WHOOGLE_ALT_RD=libreddit.momo.nohost.me
      #- WHOOGLE_ALT_MD=farside.link/scribe
      #- WHOOGLE_ALT_TL=farside.link/lingva
      #- WHOOGLE_ALT_IMG=farside.link/rimgo
      #- WHOOGLE_ALT_WIKI=farside.link/wikiless
      #- WHOOGLE_ALT_IMDB=farside.link/libremdb
      #- WHOOGLE_ALT_QUORA=farside.link/quetre
    #env_file: # Alternatively, load variables from whoogle.env
      #- whoogle.env
    ports:
      - 127.0.0.1:50001:5000

  trilium:
    container_name: trilium
    image: zadam/trilium
    restart: always
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
    ports:
      - "127.0.0.1:58080:8080"
    volumes:
      - ./appdata/trilium:/home/node/trilium-data
  i2p:
    image: geti2p/i2p
    network_mode: host
    volumes:
      - ./appdata//i2pconfig:/i2p/.i2p
      - ./appdata/i2ptorrents:/i2psnark
    ports:
      - 127.0.0.1:4444:4444