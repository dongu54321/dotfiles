  invidious:
    #image: quay.io/invidious/invidious:latest
    image: quay.io/invidious/invidious:latest-arm64
    container_name: invidious
    restart: always
    ports:
      - "127.0.0.1:50003:3000"
    environment:
      # Please read the following file for a comprehensive list of all available
      # configuration options and their associated syntax:
      # https://github.com/iv-org/invidious/blob/master/config/config.example.yml
      INVIDIOUS_CONFIG: |
        db:
          dbname: invidious
          user: kemal
          password: kemal
          host: invidious-db
          port: 5432
        check_tables: true
        # external_port:
        # domain:
        # https_only: false
        # statistics_enabled: false
    healthcheck:
      test: wget -nv --tries=1 --spider http://invidious:3000/api/v1/comments/jNQXAC9IVRw || exit 1
      interval: 30s
      timeout: 10s
      retries: 2
    depends_on:
      - invidious-db

  invidious-db:
    image: docker.io/library/postgres:14
    restart: always
    container_name: invidious-db
    volumes:
      - ./appdata/postgresdata:/var/lib/postgresql/data
      - ./appdata/invidious/config/sql:/config/sql
      - ./appdata/invidious/docker/init-invidious-db.sh:/docker-entrypoint-initdb.d/init-invidious-db.sh
    environment:
      POSTGRES_DB: invidious
      POSTGRES_USER: kemal
      POSTGRES_PASSWORD: kemal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]

  #Libreddit: 127.0.0.1:50080
  libreddit:
    container_name: libreddit
    image: 'spikecodes/libreddit:arm'
    restart: always
    ports:
      - '127.0.0.1:50080:8080'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--tries=1", "libreddit:8080/settings"]
      interval: 5m
      timeout: 3s
      retries: 2
  #Changedetection.io
  # changedetection.io:
