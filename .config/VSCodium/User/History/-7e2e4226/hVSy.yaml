version: "2.1"
services:
  webtop:
    image: lscr.io/linuxserver/webtop:debian-xfce
    container_name: webtop
    security_opt:
      - seccomp:unconfined #optional
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
      - SUBFOLDER=/ #optional
      - TITLE=momoin-Work #optional
      - CUSTOM_HTTPS_PORT=3434
    volumes:
      - $PWD/data:/config
      - $PWD/vugia:/home/vugia
      - $PWD/defaults:/custom-cont-init.d:ro
      # - /var/run/docker.sock:/var/run/docker.sock #optional
    ports:
      # - 3000:3000
      - 3434:3434
    # devices:
      # - /dev/dri:/dev/dri #optional
    shm_size: "1gb" #optional
    restart: unless-stopped