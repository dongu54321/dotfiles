#---------------------------------------------------------------------#
#     Homarr - A simple, yet powerful dashboard for your server.     #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:0.15.3
    restart: always
    networks:
      - momonet
    environment:
      - AUTH_OIDC_URI=https://auth.momoruru.duckdns.org
      - AUTH_PROVIDER=oidc
    volumes:
      - ./configs:/app/data/configs
      - ./icons:/app/public/icons
      - ./data:/data
    # ports:
    #   - '7575:7575'

networks:
  momonet:
    external: true
