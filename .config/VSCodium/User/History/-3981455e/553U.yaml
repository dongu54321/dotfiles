services:

  lldap:
    container_name: lldap
    hostname: lldap
    image: docker.io/lldap/lldap:stable
    restart: unless-stopped
    networks:
      - momonet
    # ports:
      # - 3890:3890   # LDAP
      # - 127.0.0.1:17170:17170  # Web UI
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./secrets:/secrets

networks:
  momonet:
    external: true
