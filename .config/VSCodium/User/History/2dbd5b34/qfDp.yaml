#---------------------------------------------------------------------#
#     Homarr - A simple, yet powerful dashboard for your server.     #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:0.15.3
    restart: unless-stopped
    networks:
      - momonet
    environment:
      - AUTH_OIDC_URI=https://auth.momoruru.duckdns.org
      - AUTH_PROVIDER=oidc
      - AUTH_OIDC_CLIENT_SECRET=SVbgWku4ZObWU5k3sCXbKs4vAHquFRAGaqRqnJXDOf26Ws.9Hgh2pBOIjLTHaZY_5YZqmt.X
      - AUTH_OIDC_CLIENT_ID=homarr
      - AUTH_OIDC_CLIENT_NAME=Authelia
      - AUTH_OIDC_ADMIN_GROUP=admins
      - AUTH_OIDC_OWNER_GROUP=users
      - AUTH_OIDC_AUTO_LOGIN=false
      - BASE_URL=homa.momoruru.duckdns.org
      - NEXTAUTH_URL=https://homa.momoruru.duckdns.org
    volumes:
      - ./configs:/app/data/configs
      - ./icons:/app/public/icons
      - ./data:/data
    # ports:
    #   - '7575:7575'

networks:
  momonet:
    external: true