<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralChat AI | Sci-Fi Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-robot"></i> NeuralChat</h2>
            </div>
            
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i> New Chat
            </button>
            
            <div class="sidebar-section">
                <h3><i class="fas fa-history"></i> Recent Chats</h3>
                <div class="chat-history" id="chatHistory">
                    <!-- Chat history will be populated here -->
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="controls">
                    <select id="modelSelect" class="model-select">
                        <option value="mistral">Mistral</option>
                        <option value="openai">OpenAI GPT-4.1 Nano</option>
                        <option value="openai-large">OpenAI GPT-4.1</option>
                        <option value="gpt-5-nano">OpenAI GPT-5 Nano</option>
                        <option value="llamascout">Llama 4 Scout 17</option>
                        <option value="qwen-coder">Qwen 2.5 Coder 32B</option>
                        <option value="nova-fast">Amazon Nova Micro (Bedrock)</option>
                        <option value="deepseek-reasoning">DeepSeek R1 0528 (Vertex AI)</option>
                        <option value="glm">GLM-4 9B Chat (Intelligence.io)</option>
                    </select>
                    
                    <select id="aiRoleSelect" class="role-select">
                        <option value="You are a helpful AI assistant">Helpful Assistant</option>
                        <option value="You are a professional software developer">Code Expert</option>
                        <option value="You are a creative writer">Creative Writer</option>
                        <option value="You are a scientific researcher">Scientist</option>
                        <option value="You are a teacher explaining concepts">Teacher</option>
                    </select>
                    
                    <button id="downloadBtn" class="download-btn">
                        <i class="fas fa-download"></i> Download
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <h2>Welcome to NeuralChat AI</h2>
                    <p>Select a model and start chatting. You can generate text or images!</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="message-type-toggle">
                    <button class="toggle-btn active" data-type="text" id="textBtn">
                        <i class="fas fa-font"></i> Text
                    </button>
                    <button class="toggle-btn" data-type="image" id="imageBtn">
                        <i class="fas fa-image"></i> Image
                    </button>
                </div>
                
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message here..." 
                        rows="1"
                    ></textarea>
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
