<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi AI | Sci-Fi AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="controls">
                <select id="model-select">
                    <option value="mistral">Mistral</option>
                    <option value="openai">OpenAI GPT-4.1 Nano</option>
                    <option value="openai-large">OpenAI GPT-4.1</option>
                    <option value="gpt-5-nano">OpenAI GPT-5 Nano</option>
                    <option value="llamascout">Llama 4 Scout 17</option>
                    <option value="qwen-coder">Qwen 2.5 Coder 32B</option>
                    <option value="nova-fast">Amazon Nova Micro (Bedrock)</option>
                    <option value="deepseek-reasoning">DeepSeek R1 0528 (Vertex AI)</option>
                    <option value="glm">GLM-4 9B Chat (Intelligence.io)</option>
                </select>
                <select id="role-select">
                    <option value="helpful assistant">Helpful Assistant</option>
                    <option value="creative writer">Creative Writer</option>
                    <option value="code expert">Code Expert</option>
                    <option value="scientific researcher">Scientific Researcher</option>
                </select>
                <button id="download-btn"><i class="fas fa-download"></i> Export</button>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <button id="new-chat-btn" class="new-chat-button">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <div class="saved-chats">
                    <h3>Saved Chats</h3>
                    <ul id="chat-list"></ul>
                </div>
            </div>

            <div class="chat-container">
                <div class="tabs">
                    <button id="text-tab" class="active"><i class="fas fa-comment"></i> Text</button>
                    <button id="image-tab"><i class="fas fa-image"></i> Image</button>
                </div>
                
                <div class="chat-history" id="chat-history"></div>
                
                <div class="input-area">
                    <div class="input-container">
                        <input type="text" id="user-input" placeholder="Enter your message...">
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="mode-indicator">
                        <span id="mode-text">Text Mode</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
