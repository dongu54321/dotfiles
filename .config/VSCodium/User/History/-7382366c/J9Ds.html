<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="csrf-token" content="{{ csrf_token() }}"> -->
    <title>Sci-Fi AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-robot"></i> AI CHAT</h2>
                <button id="newChatBtn" class="new-chat-btn">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            
            <div class="conversations-list">
                <h3><i class="fas fa-history"></i> Recent Chats</h3>
                <div id="conversationsContainer"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="chat-header">
                <div class="mode-selector">
                    <button id="textModeBtn" class="mode-btn active">
                        <i class="fas fa-comment"></i> Text
                    </button>
                    <button id="imageModeBtn" class="mode-btn">
                        <i class="fas fa-image"></i> Image
                    </button>
                </div>
                
                <div class="controls">
                    <select id="modelSelect" class="model-select">
                        <option value="">Default Model</option>
                    </select>
                    
                    <select id="roleSelect" class="role-select">
                        <option value="helpful assistant">Helpful Assistant</option>
                        <option value="creative writer">Creative Writer</option>
                        <option value="technical expert">Technical Expert</option>
                        <option value="teacher">Teacher</option>
                        <option value="comedian">Comedian</option>
                    </select>
                    
                    <button id="downloadBtn" class="download-btn" title="Download Conversation">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <h2>Welcome to Sci-Fi AI Chat</h2>
                    <p>Select a mode and start chatting!</p>
                    <div class="neon-circle"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
