#---------------------------------------------------------------------#
#     Jellyfin .     #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin
    restart: always
    networks:
      - momonet
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./configs:/app/data/configs
      - ./icons:/app/public/icons
      - ./data:/data
    # ports:
    #   - '7575:7575'

networks:
  momonet:
    external: true
