#---------------------------------------------------------------------#
#                         Jellyfin 8096                               #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin
    restart: always
    NoNewPrivileges: true
    networks:
      - momonet
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./config:/config
      - ./servarr:/servarr
    # ports:
    #   - '7575:7575'
    x-podman.uidmap: 1000:0:1
    x-podman.uidmap: 0:1:1000
    x-podman.uidmap: 1001:1001:64536

networks:
  momonet:
    external: true
