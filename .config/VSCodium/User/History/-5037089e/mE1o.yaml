#---------------------------------------------------------------------#
#     Jellyfin .     #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin
    restart: always
    networks:
      - momonet
    environment:
      - AUTH_OIDC_URI=https://auth.momoruru.duckdns.org
      - AUTH_PROVIDER=oidc
    volumes:
      - ./configs:/app/data/configs
      - ./icons:/app/public/icons
      - ./data:/data
    # ports:
    #   - '7575:7575'

networks:
  momonet:
    external: true
