
theme: dark
#default_2fa_method: totp

server:
  address: tcp://0.0.0.0:9091/

log:
  level: debug

totp:
  issuer: momoruru.duckdns.org #EX: example.com
  period: 60
  skew: 1
webauthn:
  disable: false
  timeout: 60s
  attestation_conveyance_preference: indirect
  user_verification: preferred
authentication_backend:
  password_reset:
    disable: false
  ldap:
    implementation: custom
    timeout: 5s
    start_tls: false
    attributes:
      username: uid
      display_name: displayName
      group_name: cn
      mail: mail
    additional_users_dn: ou=people
    users_filter: "(&({username_attribute}={input})(objectClass=person))"
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
  # file:
  #   path: /config/users_database.yml
  #   password:
  #     algorithm: argon2id
  #     iterations: 1
  #     salt_length: 16
  #     parallelism: 8
  #     memory: 64
password_policy:
  standard:
    enabled: false
    min_length: 8
    max_length: 0
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: false

access_control:
  default_policy: one_factor
  rules:
      # Rules applied to everyone
    - domain:
        -  "auth.momoruru.duckdns.org" #Ex: auth.example.com
      policy: bypass
    - domain:
        - "homa.momoruru.duckdns.org" #Ex: search.example.com - Single factor stuff. Only need a Password to authenticate.
        - "deemix.momoruru.duckdns.org"
      policy: one_factor
    - domain:
        - "cockpit.momoruru.duckdns.org" #Ex: tv.example.com - Two factor auth. Need a password as well as a OTP to authenticate.
        - "tvc.momoruru.duckdns.org"
      policy: two_factor
    - domain:
        - "radarr.momoruru.duckdns.org"
        - "prowlarr.momoruru.duckdns.org"
        - "sonarr.momoruru.duckdns.org"
        - "qbit.momoruru.duckdns.org"
      policy: one_factor
      subject:
        - "group:admins"  # access restriction based on groups
session:
  cookies:
    -
      name: 'authelia_session'
      domain: 'momoruru.duckdns.org'
      authelia_url: 'https://auth.momoruru.duckdns.org'
      default_redirection_url: 'https://homa.momoruru.duckdns.org'
      same_site: 'lax'
      inactivity: '5 minutes'
      expiration: '1 hour'
      remember_me: '1 month'  
#   redis:
#     host: redis
#     port: 6379
regulation:
  max_retries: 5
  find_time: 10m
  ban_time: 60m
storage:
  local:
    path: /config/db.sqlite3
notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    # Extend the access and refresh token lifespan from the default 30m to work around ownCloud client re-authentication prompts every few hours.
    # It should be possible to remove this once Authelia supports dynamic client registration (DCR).
    # Note: ownCloud's built-in IDP uses a value of 30d.
    lifespans:
      access_token: 30d
      refresh_token: 30d
    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
        - userinfo
    clients:
      ## Source: https://doc.owncloud.com/ocis/next/deployment/services/s-list/idp.html
      - client_id: ownCloud-web
        client_name: ownCloud web client
        public: true
        redirect_uris:
          - https://owncloud.home.yourdomain.com/
          - https://owncloud.home.yourdomain.com/oidc-callback.html
          - https://owncloud.home.yourdomain.com/oidc-silent-redirect.html
