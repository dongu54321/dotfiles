theme: dark
#default_2fa_method: totp

server:
  address: tcp://0.0.0.0:9091/

log:
  level: debug

totp:
  issuer: momoruru.duckdns.org #EX: example.com
  period: 60
  skew: 1
webauthn:
  disable: false
  timeout: 60s
  attestation_conveyance_preference: indirect
  user_verification: preferred
authentication_backend:
  password_reset:
    disable: false
  ldap:
    implementation: custom
    timeout: 5s
    start_tls: false
    attributes:
      username: uid
      display_name: displayName
      group_name: cn
      mail: mail
    additional_users_dn: ou=people
    users_filter: "(&({username_attribute}={input})(objectClass=person))"
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
  # file:
  #   path: /config/users_database.yml
  #   password:
  #     algorithm: argon2id
  #     iterations: 1
  #     salt_length: 16
  #     parallelism: 8
  #     memory: 64
password_policy:
  standard:
    enabled: false
    min_length: 8
    max_length: 0
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: false

access_control:
  default_policy: one_factor
  rules:
      # Rules applied to everyone
    - domain:
        - "auth.momoruru.duckdns.org" #Ex: auth.example.com
      policy: bypass
    - domain:
        - "homa.momoruru.duckdns.org" #Ex: search.example.com - Single factor stuff. Only need a Password to authenticate.
        - "deemix.momoruru.duckdns.org"
        - "jellyfin.momoruru.duckdns.org"
      policy: one_factor
    - domain:
        - "cockpit.momoruru.duckdns.org" #Ex: tv.example.com - Two factor auth. Need a password as well as a OTP to authenticate.
        - "tvc.momoruru.duckdns.org"
      policy: two_factor
    - domain:
        - "radarr.momoruru.duckdns.org"
        - "prowlarr.momoruru.duckdns.org"
        - "sonarr.momoruru.duckdns.org"
        - "qbit.momoruru.duckdns.org"
      policy: one_factor
      subject:
        - "group:admins"  # access restriction based on groups
session:
  cookies:
    - name: 'authelia_session'
      domain: 'momoruru.duckdns.org'
      authelia_url: 'https://auth.momoruru.duckdns.org'
      default_redirection_url: 'https://homa.momoruru.duckdns.org'
      same_site: 'lax'
      inactivity: '5 minutes'
      expiration: '1 hour'
      remember_me: '1 month'
#   redis:
#     host: redis
#     port: 6379
regulation:
  max_retries: 5
  find_time: 10m
  ban_time: 60m
storage:
  local:
    path: /config/db.sqlite3
notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    #hmac_secret: 'this_is_a_secret_abc123abc123abc'
    # jwks:
    #   - key: |
    #     -----BEGIN PRIVATE KEY-----
    #     -----END PRIVATE KEY-----
    enable_client_debug_messages: false
    minimum_parameter_entropy: 8
    enforce_pkce: 'public_clients_only'
    enable_pkce_plain_challenge: false
    enable_jwt_access_token_stateless_introspection: false
    discovery_signed_response_alg: 'none'
    discovery_signed_response_key_id: ''
    require_pushed_authorization_requests: false
    lifespans:
      access_token: '1h'
      authorize_code: '1m'
      id_token: '1h'
      refresh_token: '90m'
    cors:
      endpoints:
        - 'authorization'
        - 'token'
        - 'revocation'
        - 'introspection'
        - 'userinfo'
      allowed_origins:
        - 'https://momoruru.duckdns.org'
      allowed_origins_from_client_redirect_uris: false

    clients:
      - client_id: 'homarr'
        client_name: 'Homarr'
        client_secret: '$pbkdf2-sha512$310000$FVKuw/XMpT24KipkPv/xjA$VgSCpmUeBHOTRL7R4iQ/5KzrqADwNO.5RzGYvbKjWwxvDicBGmNVfKZ42TA3b/OqUFxQbco9zjWYuafw7SXEZQ'  # The digest of 'insecure_secret'.
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://homa.momoruru.duckdns.org/api/auth/callback/oidc'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
          - 'email'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'

      - client_id: 'jellyfin'
        client_name: 'Jellyfin'
        client_secret: '$pbkdf2-sha512$310000$c8p78n7pUMln0jzvd4aK4Q$JNRBzwAo0ek5qKn50cFzzvE9RXV88h1wJn5KGiHrD0YKtZaR/nCb2CJPOsKaPK0hjf.9yHxzQGZziziccp6Yng'  # The digest of 'insecure_secret'.
        public: false
        authorization_policy: 'one_factor'
        require_pkce: true
        pkce_challenge_method: 'S256'
        redirect_uris:
          - 'https://jellyfin.momoin.duckdns.org/sso/OID/redirect/authelia'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_post'

