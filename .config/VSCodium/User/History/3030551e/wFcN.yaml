version: "3.7"
#networks:
  #momonet:
    #external: true

services:
  #################################################################
                            #Jellyfin
  jellyfin:
    security_opt:
      - no-new-privileges:true
    restart: always
    image: lscr.io/linuxserver/jellyfin
    container_name: jellyfin
    #networks:
      #- momonet
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./jellyfin/config:/config
      - /media/hdd/servarr/media:/servarr/media
      - /media/hdd/servarr/torrents/custom:/custom
      - /media/hdd/servarr/user:/servarr/user
      # - /media/hdd/servarr/Animes:/data/Animes
      # - /media/hdd/servarr/IphoneProMax:/data/IphoneProMax
    ports:
    - "127.0.0.1:8096:8096"
      # - 8920:8920 #optional
      # - 7359:7359/udp #optional
      # - 1900:1900/udp #optional

  #################################################################
                            #Radarr - Movies 7878
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    #networks:
      #- momonet
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./radarr/config:/config
      - /media/hdd/servarr:/servarr
    ports:
      - 127.0.0.1:7878:7878
    restart: always
  #################################################################
                            #Bazarr - Subtitles 6767
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    #networks:
      #- momonet
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./bazarr/config:/config
      - /media/hdd/servarr/media:/servarr/media
    ports:
      - 127.0.0.1:6767:6767
    restart: always
  #################################################################
                            #Sonarr - Series Managment 8989
  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:latest
    #networks:
      #- momonet
    restart: always
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./sonarr/config:/config
      - /media/hdd/servarr:/servarr
    ports:
      - 127.0.0.1:8989:8989
  #################################################################
                          #Lidarr - Deemix
  lidarr:
    image: docker.io/youegraillot/lidarr-on-steroids
    container_name: lidarr
    restart: always
    user: 0:0
    userns_mode: keep-id:uid=1000
    environment:
      # - PUID=0
      # - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:8686:8686" # Lidarr web UI
      - "127.0.0.1:6596:6595" # Deemix web UI
    volumes:
      - ./lidarr/config:/config
      - ./lidarr/deemix:/config_deemix
      - /media/hdd/servarr/user/downloads:/downloads
      # - <path>:/music
      - /media/hdd/servarr:/servarr

  #################################################################
                            #Prowlarr - 9696 Indexers fo arrr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    # networks:
      # - momonet
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 127.0.0.1:9696:9696
    restart: always

  #################################################################
                            #Qbittorrent 8080
  qbittorrent:
    container_name: qbittorrent
    #image: cr.hotio.dev/hotio/qbittorrent
    image: lscr.io/linuxserver/qbittorrent
    restart: always
    #networks:
      #- momonet
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Ho_Chi_Minh
      - UMASK=002
    volumes:
      - ./qbittorrent:/config
      - /media/hdd/servarr/torrents:/servarr/torrents
      # - APP_DIR=/servarr/torrents:z
