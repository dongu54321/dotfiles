services:
  caddy:
    image: docker.io/caddy:latest
    container_name: caddy
    restart: always
    networks:
      - momonet
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "[::]:443:443"
      - "[::]:80:80"
    volumes:
      - $HOME/podman/app/caddy/caddy-etc:/etc/caddy
      - $HOME/podman/app/caddy/data:/data
      - $HOME/podman/app/caddy/config:/config
networks:
  momonet:
    external: true
